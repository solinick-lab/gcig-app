name: Server tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci --ignore-scripts

      # bcrypt is a native module. `--ignore-scripts` skips its
      # postinstall binary build, so every test that loads the auth /
      # president-step-down routes (which import bcrypt) crashes on
      # require — a false red on every PR. Rebuild just bcrypt's
      # binding; --ignore-scripts still guards every other package.
      - run: npm rebuild bcrypt

      - run: npx prisma generate

      - run: npm test
