name: Weekly Website Summary

# Runs at 9:00 AM EDT (13:00 UTC) every Monday.
# Also runnable manually from the Actions tab.
on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build weekly summary
        id: build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SINCE=$(date -d '7 days ago' '+%Y-%m-%d')
          TODAY=$(date '+%B %d, %Y')
          WEEK_AGO=$(date -d '7 days ago' '+%B %d, %Y')
          export LOG=$(git log --since="$SINCE" --pretty=format:"%ad - %s" --date=format:"%a %b %d")
          PLAIN=$(python3 - << 'PYEOF'
import os, json, urllib.request
log = os.environ.get('LOG', '')
key = os.environ.get('ANTHROPIC_API_KEY', '')
if not log.strip():
    print('No changes were made to the GCIG website this week.')
else:
    prompt = 'Translate these git commits into a 2-4 sentence plain-English summary for a non-technical reader. No bullet points.\n\n' + log
    req = urllib.request.Request('https://api.anthropic.com/v1/messages',
        data=json.dumps({'model':'claude-haiku-4-5-20251001','max_tokens':512,'messages':[{'role':'user','content':prompt}]}).encode(),
        headers={'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json'})
    resp = json.loads(urllib.request.urlopen(req).read())
    print(resp['content'][0]['text'])
PYEOF
          )
          echo "Hi - GCIG website update for the week of $WEEK_AGO:" > /tmp/body.txt
          echo "" >> /tmp/body.txt
          echo "$PLAIN" >> /tmp/body.txt
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/body.txt >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "subject=GCIG Weekly Update: $WEEK_AGO - $TODAY" >> $GITHUB_OUTPUT

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: ${{ steps.build.outputs.subject }}
          to: solinick@gcschool.org
          from: GCIG Updates <sjo53@georgetown.edu>
          body: ${{ steps.build.outputs.body }}
