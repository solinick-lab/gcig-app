name: Daily Portfolio Snapshot

# Runs at 22:00 UTC every day (5pm EST / 6pm EDT — after US market close).
# Also runnable manually from the Actions tab.
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily snapshot
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            https://gcig-api.onrender.com/api/holdings/snapshot/daily)

          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP $CODE"
          echo "$BODY"

          if [ "$CODE" != "200" ]; then
            echo "::error::Snapshot failed with status $CODE"
            exit 1
          fi
