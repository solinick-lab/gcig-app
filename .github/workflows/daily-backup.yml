name: Daily Postgres Backup

# Runs every day at 08:00 UTC (4am ET) — off-peak for the club.
# Manual trigger also available from the Actions tab.
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump 16
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt jammy-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          STAMP=$(date -u +%Y-%m-%d)
          pg_dump --no-owner --no-privileges "$DATABASE_URL" | gzip > "gcig-$STAMP.sql.gz"
          ls -lh gcig-*.sql.gz

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BACKUPS_BUCKET }}
        run: |
          STAMP=$(date -u +%Y-%m-%d)
          aws s3 cp "gcig-$STAMP.sql.gz" "s3://$R2_BUCKET/backups/gcig-$STAMP.sql.gz" \
            --endpoint-url "https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com" \
            --region auto
          echo "Backup uploaded to s3://$R2_BUCKET/backups/gcig-$STAMP.sql.gz"

      - name: Keep only last 30 days of backups
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BACKUPS_BUCKET }}
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%d)
          aws s3 ls "s3://$R2_BUCKET/backups/" \
            --endpoint-url "https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com" \
            --region auto |
          awk '{print $4}' | while read -r FILE; do
            [ -z "$FILE" ] && continue
            NAME_STAMP=$(echo "$FILE" | sed -E 's/^gcig-([0-9-]{10}).*/\1/')
            if [ "$NAME_STAMP" \< "$CUTOFF" ]; then
              aws s3 rm "s3://$R2_BUCKET/backups/$FILE" \
                --endpoint-url "https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com" \
                --region auto
              echo "Pruned $FILE"
            fi
          done
